name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: python -m pip install poetry

      - name: Validate Poetry configuration
        run: python -m poetry check --lock

      - name: Install dependencies
        run: python -m poetry install --no-interaction

      - name: Lint source and tests
        run: python -m poetry run ruff check app.py src tests

      - name: Run tests with coverage
        run: python -m poetry run pytest --cov-report=term-missing --cov-report=xml

      - name: Smoke-test CLI entry points
        run: |
          python -m poetry run music-genre-data --help
          python -m poetry run music-genre-train --help
          python -m poetry run music-genre-evaluate --help

      - name: Build Python package
        run: python -m poetry build

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts
          path: |
            coverage.xml
            dist/
          if-no-files-found: error

  deploy:
    name: Deploy gate (Streamlit Cloud)
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (same as Community Cloud)
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Verify Streamlit entrypoint and package
        run: |
          python -m py_compile app.py
          PYTHONPATH=src python -c "import music_genre.dashboard"

      - name: Deployment note
        run: |
          echo "Main passed CI. Streamlit Community Cloud pulls from GitHub when you connect this repo;"
          echo "set Main file to app.py and Python 3.11. Each push to main triggers a fresh build there."

  delivery:
    name: Build submission artifact
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare submission folder
        run: |
          mkdir -p build/submission
          rsync -a \
            --exclude ".git" \
            --exclude ".venv" \
            --exclude "__pycache__" \
            --exclude ".pytest_cache" \
            --exclude ".ruff_cache" \
            --exclude ".coverage" \
            --exclude "htmlcov" \
            --exclude "data/raw/*" \
            --exclude "data/interim/*" \
            --exclude "data/processed/*" \
            --exclude "mlruns" \
            --exclude "models/*.joblib" \
            --exclude "reports/*.json" \
            --exclude "reports/*.png" \
            ./ build/submission/Music-Genre-Classfication/
          {
            echo "# Submission Artifact"
            echo ""
            echo "Generated by GitHub Actions."
            echo ""
            echo "- Workflow: $GITHUB_WORKFLOW"
            echo "- Run number: $GITHUB_RUN_NUMBER"
            echo "- Commit: $GITHUB_SHA"
            echo "- Branch/ref: $GITHUB_REF"
            echo ""
            echo "Raw datasets, trained models, MLflow runs, and generated reports are intentionally excluded from this artifact because the datasets and model artifacts are large. Recreate them locally with:"
            echo ""
            echo '```powershell'
            echo "make serve"
            echo '```'
          } > build/submission/Music-Genre-Classfication/SUBMISSION_MANIFEST.md

      - name: Upload submission artifact
        uses: actions/upload-artifact@v4
        with:
          name: music-genre-classification-submission
          path: build/submission/Music-Genre-Classfication/
          if-no-files-found: error
